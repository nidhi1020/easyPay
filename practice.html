<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="button-1">button1</button>
    <button id="button-2">button2</button>
    <h1 id="h-1">i am heading 1</h1>
    <h1 id="h-2">i am heading 2</h1>

    <script>
        document.getElementById('button-1').addEventListener('click',function(){
            document.getElementById('h-2').style.display='none'

            document.getElementById('h-1').style.display='block'
        })
        document.getElementById('button-2').addEventListener('click',function(){
            document.getElementById('h-1').style.display='none'

            document.getElementById('h-2').style.display='block'
        })

    </script>
    
</body>
</html>
