        <div class="">

            <form class="bg-white rounded-2xl p-8">

                    <h2 class="font-semibold">select a bank</h2>   
                    <select class="select bg-[#F4F5F7] mt-3 rounded-3xl w-full p-3">

                <div class="mt-3">
                    <label for=""class="font-semibold">Bank Account Number</label> <br>

                </div>
                <div class="mt-3">
                    <label for=""class="font-semibold">Amount to Add</label> <br>
                    <input  type="text" placeholder="Add Amount to withdraw" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full p-3" />
                </div>
                <div class="mt-3">
                    <label for=""class="font-semibold">Pin Number</label> <br>
                    <input type="text" placeholder="Enter 4 digit pin number" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full p-3" />
                </div>
                <button id="" class="btn bg-[#0874F2] mt-5 w-full rounded-3xl text-white">Add Money</button>
            </form>
